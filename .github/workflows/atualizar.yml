name: Atualização Diária JurisProtege

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4 feedparser

      - run: mkdir -p data

      - run: python scripts/coletar.py

      - run: |
          git config user.name "JurisProtege Bot"
          git config user.email "bot@jurisprotege.netlify.app"
          git add data/noticias.json data/legislacao.json
          git diff --staged --quiet || git commit -m "Atualização $(date '+%d/%m/%Y')" && git push
