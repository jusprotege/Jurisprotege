name: Atualizar JurisProtege

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4 feedparser

      - run: mkdir -p data && python scripts/coletar.py

     - run: |
          git config user.name "Bot"
          git config user.email "bot@bot.com"
          git add data/
          git diff --staged --quiet || (git commit -m "Atualização $(date '+%d/%m/%Y')" && git push)
